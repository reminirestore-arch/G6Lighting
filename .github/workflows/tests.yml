name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Build & test on macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show toolchain
        run: |
          swift --version
          xcrun --show-sdk-path

      - name: Build (release)
        run: swift build -c release --arch arm64

      - name: Run tests
        run: swift run G6LightingTestRunner --testing-library swift-testing

      # Coverage: re-build the test runner with profiling, run it, then convert
      # the resulting .profraw into LCOV that Codecov can ingest.
      - name: Build with coverage
        run: swift build -c debug --enable-code-coverage --product G6LightingTestRunner

      - name: Run tests with coverage
        env:
          LLVM_PROFILE_FILE: coverage.profraw
        run: swift run -c debug --enable-code-coverage G6LightingTestRunner --testing-library swift-testing

      - name: Convert profile to LCOV
        run: |
          BIN_PATH=$(swift build -c debug --enable-code-coverage --show-bin-path)
          PROF_DATA="${BIN_PATH}/codecov/default.profdata"
          if [ ! -f "$PROF_DATA" ]; then
            xcrun llvm-profdata merge -sparse coverage.profraw -o coverage.profdata
            PROF_DATA=coverage.profdata
          fi
          xcrun llvm-cov export \
            -format=lcov \
            -instr-profile="$PROF_DATA" \
            -ignore-filename-regex='(\.build|Tests|TestRunner)' \
            "${BIN_PATH}/G6LightingTestRunner" \
            > coverage.lcov
          wc -l coverage.lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.lcov
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
