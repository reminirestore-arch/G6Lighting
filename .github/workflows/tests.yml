name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Build & test on macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show toolchain
        run: |
          swift --version
          xcrun --show-sdk-path

      - name: Build (release)
        run: swift build -c release --arch arm64

      - name: Run tests
        run: swift run G6LightingTestRunner --testing-library swift-testing
